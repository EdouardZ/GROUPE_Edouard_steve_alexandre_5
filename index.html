<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Compatibilité Amoureuse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>💕 Test de Compatibilité 💕</h1>
        <p class="subtitle">Découvrez votre compatibilité amoureuse par numérologie</p>
        
        <div class="input-group">
            <label><span class="icon">👨</span>Prénom du garçon</label>
            <input type="text" id="boyName" placeholder="Ex: Robert" autocomplete="off">
        </div>

        <div class="input-group">
            <label><span class="icon">👩</span>Prénom de la fille</label>
            <input type="text" id="girlName" placeholder="Ex: Marie" autocomplete="off">
        </div>

        <button onclick="calculateCompatibility()">✨ Tester la compatibilité ✨</button>

        <div id="result" class="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
